# Override pour Plausible CE v3 — déployé sur /opt/plausible-ce/compose.override.yml
#
# Pourquoi cet override :
# - Le port 8000 est déjà pris par Kong (Supabase)
# - On expose Plausible sur 127.0.0.1:8001 (loopback uniquement, accessible via Caddy)
#
# Note : en v3, les services ont déjà `restart: always` dans compose.yml et
# il n'y a plus de service `mail` séparé.

services:
  plausible:
    ports:
      - "127.0.0.1:8001:8000"
